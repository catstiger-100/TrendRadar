<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TrendRadar 管理后台</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --panel: #ffffff;
      --text: #18202f;
      --muted: #667085;
      --line: #d8dee8;
      --accent: #176b87;
      --accent-dark: #11536a;
      --soft: #e9f4f7;
      --danger: #b42318;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }
    .sidebar {
      width: 224px;
      flex: 0 0 224px;
      background: #111827;
      color: #fff;
      padding: 24px 14px;
    }
    .brand {
      font-size: 18px;
      font-weight: 700;
      padding: 0 10px 22px;
    }
    .menu-item {
      width: 100%;
      border: 0;
      border-radius: 6px;
      padding: 12px 14px;
      background: #243244;
      color: #fff;
      font-size: 14px;
      text-align: left;
      cursor: pointer;
    }
    main {
      flex: 1;
      min-width: 0;
      padding: 28px;
    }
    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 26px;
      line-height: 1.2;
    }
    .muted {
      color: var(--muted);
      font-size: 13px;
    }
    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .file-input {
      position: relative;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      padding: 10px 12px;
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
    }
    .file-input input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }
    button.primary {
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      padding: 11px 16px;
      font-size: 14px;
      cursor: pointer;
    }
    button.primary:hover { background: var(--accent-dark); }
    button.primary:disabled {
      opacity: .55;
      cursor: not-allowed;
    }
    .status {
      min-height: 20px;
      margin: 10px 0 18px;
      font-size: 13px;
      color: var(--muted);
    }
    .status.error { color: var(--danger); }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 18px;
      align-items: start;
    }
    .section {
      background: transparent;
      border-top: 1px solid var(--line);
      padding-top: 18px;
    }
    .module {
      margin-bottom: 28px;
    }
    .module h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }
    .category {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .category h3 {
      margin: 0;
      padding: 12px 14px;
      font-size: 15px;
      background: var(--soft);
      border-bottom: 1px solid var(--line);
    }
    .group {
      padding: 12px 14px;
      border-bottom: 1px solid #eef1f5;
    }
    .group:last-child { border-bottom: 0; }
    .group-title {
      font-weight: 650;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .chip {
      background: #f2f4f7;
      border: 1px solid #e4e7ec;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 12px;
      color: #344054;
      max-width: 100%;
      overflow-wrap: anywhere;
    }
    aside {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      position: sticky;
      top: 20px;
    }
    aside h2 {
      margin: 0 0 12px;
      font-size: 15px;
    }
    .backup {
      padding: 10px 0;
      border-top: 1px solid #eef1f5;
    }
    .backup:first-of-type { border-top: 0; }
    .backup-name {
      font-size: 13px;
      font-weight: 600;
      overflow-wrap: anywhere;
    }
    @media (max-width: 820px) {
      body { display: block; }
      .sidebar {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px;
      }
      .brand { padding: 0; }
      .menu-item { width: auto; }
      main { padding: 18px; }
      .topbar { display: block; }
      .toolbar { margin-top: 14px; }
      .layout { grid-template-columns: 1fr; }
      aside { position: static; }
    }
  </style>
</head>
<body>
  <nav class="sidebar">
    <div class="brand">TrendRadar</div>
    <button class="menu-item" type="button">关键词管理</button>
  </nav>

  <main>
    <div class="topbar">
      <div>
        <h1>关键词管理</h1>
        <div class="muted" id="updatedAt">正在读取当前关键词</div>
      </div>
      <div class="toolbar">
        <label class="file-input">
          <span id="fileName">选择 Markdown 或 XLSX 文件</span>
          <input id="fileInput" type="file" accept=".md,.markdown,.xlsx,text/markdown,text/plain,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet">
        </label>
        <button class="primary" id="uploadBtn" type="button" disabled>上传并覆盖</button>
      </div>
    </div>

    <div class="status" id="status"></div>

    <div class="layout">
      <section class="section" id="keywordList"></section>
      <aside>
        <h2>备份文件</h2>
        <div id="backupList" class="muted">正在读取备份</div>
      </aside>
    </div>
  </main>

  <script>
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');
    const uploadBtn = document.getElementById('uploadBtn');
    const statusEl = document.getElementById('status');
    const keywordList = document.getElementById('keywordList');
    const backupList = document.getElementById('backupList');
    const updatedAt = document.getElementById('updatedAt');

    function setStatus(text, isError = false) {
      statusEl.textContent = text || '';
      statusEl.classList.toggle('error', isError);
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function renderKeywords(modules) {
      if (!modules || modules.length === 0) {
        keywordList.innerHTML = '<div class="muted">暂无关键词</div>';
        return;
      }
      keywordList.innerHTML = modules.map(module => `
        <div class="module">
          <h2>${escapeHtml(module.name)}</h2>
          ${module.categories.map(category => `
            <div class="category">
              <h3>${escapeHtml(category.name)}</h3>
              ${category.groups.map(group => `
                <div class="group">
                  <div class="group-title">${escapeHtml(group.title)}</div>
                  <div class="chips">
                    ${group.keywords.map(keyword => `<span class="chip">${escapeHtml(keyword)}</span>`).join('')}
                  </div>
                </div>
              `).join('')}
            </div>
          `).join('')}
        </div>
      `).join('');
    }

    function renderBackups(backups) {
      if (!backups || backups.length === 0) {
        backupList.innerHTML = '<div class="muted">暂无备份</div>';
        return;
      }
      backupList.innerHTML = backups.map(item => `
        <div class="backup">
          <div class="backup-name">${escapeHtml(item.name)}</div>
          <div class="muted">${escapeHtml(item.created_at)} · ${Math.ceil(item.size / 1024)} KB</div>
        </div>
      `).join('');
    }

    async function fetchJson(url, options) {
      const response = await fetch(url, options);
      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(data.error || '请求失败');
      }
      return data;
    }

    async function loadKeywords() {
      const data = await fetchJson('/api/keywords');
      renderKeywords(data.modules);
      updatedAt.textContent = data.updated_at ? `当前文件更新时间：${data.updated_at}` : '当前关键词';
    }

    async function loadBackups() {
      const data = await fetchJson('/api/keywords/backups');
      renderBackups(data.backups);
    }

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      fileName.textContent = file ? file.name : '选择 Markdown 文件';
      uploadBtn.disabled = !file;
      setStatus('');
    });

    uploadBtn.addEventListener('click', async () => {
      const file = fileInput.files[0];
      if (!file) return;

      const form = new FormData();
      form.append('file', file);
      uploadBtn.disabled = true;
      setStatus('正在上传并转换关键词');

      try {
        const data = await fetchJson('/api/keywords/upload', {
          method: 'POST',
          body: form
        });
        renderKeywords(data.modules);
        updatedAt.textContent = data.updated_at ? `当前文件更新时间：${data.updated_at}` : '当前关键词';
        setStatus(data.backup ? `更新完成，已备份为 ${data.backup}` : '更新完成');
        await loadBackups();
      } catch (error) {
        setStatus(error.message, true);
      } finally {
        uploadBtn.disabled = !fileInput.files[0];
      }
    });

    Promise.all([loadKeywords(), loadBackups()]).catch(error => {
      setStatus(error.message, true);
    });
  </script>
</body>
</html>
