<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TrendRadar 管理后台</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --panel: #ffffff;
      --text: #18202f;
      --muted: #667085;
      --line: #d8dee8;
      --accent: #176b87;
      --accent-dark: #11536a;
      --soft: #e9f4f7;
      --danger: #b42318;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }
    .sidebar {
      width: 224px;
      flex: 0 0 224px;
      background: #111827;
      color: #fff;
      padding: 24px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .brand {
      font-size: 18px;
      font-weight: 700;
      padding: 0 10px 22px;
    }
    .menu-item {
      width: 100%;
      border: 0;
      border-radius: 6px;
      padding: 12px 14px;
      background: #243244;
      color: #fff;
      font-size: 14px;
      text-align: left;
      cursor: pointer;
      transition: background .15s;
    }
    .menu-item:hover { background: #2d3f56; }
    .menu-item.active { background: var(--accent); }
    main {
      flex: 1;
      min-width: 0;
      padding: 28px;
    }
    .page { display: none; }
    .page.active { display: block; }
    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 26px;
      line-height: 1.2;
    }
    .muted { color: var(--muted); font-size: 13px; }
    .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .file-input {
      position: relative; overflow: hidden; display: inline-flex; align-items: center;
      gap: 8px; border: 1px solid var(--line); border-radius: 6px;
      background: var(--panel); padding: 10px 12px; color: var(--text);
      font-size: 14px; cursor: pointer;
    }
    .file-input input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    button.primary {
      border: 0; border-radius: 6px; background: var(--accent); color: #fff;
      padding: 11px 16px; font-size: 14px; cursor: pointer;
    }
    button.primary:hover { background: var(--accent-dark); }
    button.primary:disabled { opacity: .55; cursor: not-allowed; }
    .status { min-height: 20px; margin: 10px 0 18px; font-size: 13px; color: var(--muted); }
    .status.error { color: var(--danger); }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 18px;
      align-items: start;
    }
    .section { background: transparent; border-top: 1px solid var(--line); padding-top: 18px; }
    .module { margin-bottom: 28px; }
    .module h2 { margin: 0 0 12px; font-size: 18px; }
    .category {
      background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
      margin-bottom: 12px; overflow: hidden;
    }
    .category h3 {
      margin: 0; padding: 12px 14px; font-size: 15px;
      background: var(--soft); border-bottom: 1px solid var(--line);
    }
    .group { padding: 12px 14px; border-bottom: 1px solid #eef1f5; }
    .group:last-child { border-bottom: 0; }
    .group-title { font-weight: 650; margin-bottom: 8px; font-size: 14px; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      background: #f2f4f7; border: 1px solid #e4e7ec; border-radius: 999px;
      padding: 4px 9px; font-size: 12px; color: #344054;
      max-width: 100%; overflow-wrap: anywhere;
    }
    aside {
      background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
      padding: 14px; position: sticky; top: 20px;
    }
    aside h2 { margin: 0 0 12px; font-size: 15px; }
    .backup { padding: 10px 0; border-top: 1px solid #eef1f5; }
    .backup:first-of-type { border-top: 0; }
    .backup-name { font-size: 13px; font-weight: 600; overflow-wrap: anywhere; }

    /* 资讯查询样式 */
    .search-bar {
      display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap;
      margin-bottom: 18px; padding: 16px;
      background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
    }
    .search-bar label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 4px; }
    .search-bar input {
      border: 1px solid var(--line); border-radius: 6px; padding: 8px 10px;
      font-size: 14px; outline: none; width: 200px;
    }
    .search-bar input:focus { border-color: var(--accent); }
    table {
      width: 100%; border-collapse: collapse;
      background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
      overflow: hidden;
    }
    th {
      text-align: left; padding: 10px 14px; font-size: 12px; font-weight: 650;
      color: var(--muted); text-transform: uppercase; background: #f9fafb;
      border-bottom: 1px solid var(--line);
    }
    td { padding: 10px 14px; font-size: 13px; border-bottom: 1px solid #f2f4f7; }
    tr:last-child td { border-bottom: 0; }
    td a { color: var(--accent); text-decoration: none; }
    td a:hover { text-decoration: underline; }
    .kw-tag {
      display: inline-block; background: #e9f4f7; color: var(--accent);
      border-radius: 3px; padding: 1px 6px; font-size: 11px; margin: 1px 3px 1px 0;
    }
    .cat-tag {
      display: inline-block; background: #f2f4f7; color: #344054;
      border-radius: 3px; padding: 1px 6px; font-size: 11px; margin: 1px 3px 1px 0;
    }
    .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 18px; }
    .pagination button {
      border: 1px solid var(--line); border-radius: 6px; background: var(--panel);
      padding: 6px 14px; font-size: 13px; cursor: pointer;
    }
    .pagination button:hover:not(:disabled) { background: var(--soft); }
    .pagination button:disabled { opacity: .4; cursor: not-allowed; }
    .pagination .page-info { font-size: 13px; color: var(--muted); }
    .no-data { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }

    @media (max-width: 820px) {
      body { display: block; }
      .sidebar { width: 100%; display: flex; flex-direction: row; align-items: center; gap: 12px; padding: 14px; }
      .brand { padding: 0; }
      .menu-item { width: auto; }
      main { padding: 18px; }
      .topbar { display: block; }
      .toolbar { margin-top: 14px; }
      .layout { grid-template-columns: 1fr; }
      aside { position: static; }
      .search-bar { flex-direction: column; }
      .search-bar input { width: 100%; }
    }
  </style>
</head>
<body>
  <nav class="sidebar">
    <div class="brand">TrendRadar</div>
    <button class="menu-item active" data-page="keywords" type="button">关键词管理</button>
    <button class="menu-item" data-page="news" type="button">资讯查询</button>
  </nav>

  <main>
    <!-- 关键词管理页面 -->
    <div class="page active" id="page-keywords">
      <div class="topbar">
        <div>
          <h1>关键词管理</h1>
          <div class="muted" id="updatedAt">正在读取当前关键词</div>
        </div>
        <div class="toolbar">
          <label class="file-input">
            <span id="fileName">选择 Markdown 或 XLSX 文件</span>
            <input id="fileInput" type="file" accept=".md,.markdown,.xlsx,text/markdown,text/plain,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet">
          </label>
          <button class="primary" id="uploadBtn" type="button" disabled>上传并覆盖</button>
        </div>
      </div>
      <div class="status" id="status"></div>
      <div class="layout">
        <section class="section" id="keywordList"></section>
        <aside>
          <h2>备份文件</h2>
          <div id="backupList" class="muted">正在读取备份</div>
        </aside>
      </div>
    </div>

    <!-- 资讯查询页面 -->
    <div class="page" id="page-news">
      <h1>资讯查询</h1>
      <div class="muted" style="margin-bottom:16px">查询已抓取的新闻资讯，按发布时间逆序排列</div>

      <div class="search-bar">
        <div>
          <label for="searchKeyword">关键词</label>
          <input id="searchKeyword" type="text" placeholder="输入关键词搜索...">
        </div>
        <div>
          <label for="searchDate">日期</label>
          <input id="searchDate" type="date">
        </div>
        <button class="primary" id="searchBtn" type="button">查询</button>
        <button class="primary" id="resetBtn" type="button" style="background:#667085">重置</button>
      </div>

      <div class="status" id="newsStatus"></div>

      <table id="newsTable">
        <thead>
          <tr>
            <th style="width:35%">标题</th>
            <th style="width:12%">来源</th>
            <th style="width:10%">一级分类</th>
            <th style="width:10%">二级分类</th>
            <th style="width:18%">关键词</th>
            <th style="width:15%">抓取时间</th>
          </tr>
        </thead>
        <tbody id="newsBody"></tbody>
      </table>

      <div class="pagination" id="pagination"></div>
    </div>
  </main>

  <script>
    // ── 页面切换 ──
    const menuItems = document.querySelectorAll('.menu-item');
    const pages = document.querySelectorAll('.page');

    menuItems.forEach(btn => {
      btn.addEventListener('click', () => {
        menuItems.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        pages.forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + btn.dataset.page).classList.add('active');
      });
    });

    // ── 通用工具 ──
    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[char]));
    }

    async function fetchJson(url, options) {
      const resp = await fetch(url, options);
      const data = await resp.json().catch(() => ({}));
      if (!resp.ok) throw new Error(data.error || '请求失败');
      return data;
    }

    // ── 关键词管理 ──
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');
    const uploadBtn = document.getElementById('uploadBtn');
    const statusEl = document.getElementById('status');
    const keywordList = document.getElementById('keywordList');
    const backupList = document.getElementById('backupList');
    const updatedAt = document.getElementById('updatedAt');

    function setStatus(text, isError = false) {
      statusEl.textContent = text || '';
      statusEl.classList.toggle('error', isError);
    }

    function renderKeywords(modules) {
      if (!modules || modules.length === 0) {
        keywordList.innerHTML = '<div class="muted">暂无关键词</div>';
        return;
      }
      keywordList.innerHTML = modules.map(module => `
        <div class="module">
          <h2>${escapeHtml(module.name)}</h2>
          ${module.categories.map(cat => `
            <div class="category">
              <h3>${escapeHtml(cat.name)}</h3>
              ${cat.groups.map(group => `
                <div class="group">
                  <div class="group-title">${escapeHtml(group.title)}</div>
                  <div class="chips">
                    ${group.keywords.map(kw => `<span class="chip">${escapeHtml(kw)}</span>`).join('')}
                  </div>
                </div>
              `).join('')}
            </div>
          `).join('')}
        </div>
      `).join('');
    }

    function renderBackups(backups) {
      if (!backups || backups.length === 0) {
        backupList.innerHTML = '<div class="muted">暂无备份</div>';
        return;
      }
      backupList.innerHTML = backups.map(item => `
        <div class="backup">
          <div class="backup-name">${escapeHtml(item.name)}</div>
          <div class="muted">${escapeHtml(item.created_at)} · ${Math.ceil(item.size / 1024)} KB</div>
        </div>
      `).join('');
    }

    async function loadKeywords() {
      const data = await fetchJson('/api/keywords');
      renderKeywords(data.modules);
      updatedAt.textContent = data.updated_at ? `当前文件更新时间：${data.updated_at}` : '当前关键词';
    }

    async function loadBackups() {
      const data = await fetchJson('/api/keywords/backups');
      renderBackups(data.backups);
    }

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      fileName.textContent = file ? file.name : '选择 Markdown 文件';
      uploadBtn.disabled = !file;
      setStatus('');
    });

    uploadBtn.addEventListener('click', async () => {
      const file = fileInput.files[0];
      if (!file) return;
      const form = new FormData();
      form.append('file', file);
      uploadBtn.disabled = true;
      setStatus('正在上传并转换关键词');
      try {
        const data = await fetchJson('/api/keywords/upload', { method: 'POST', body: form });
        renderKeywords(data.modules);
        updatedAt.textContent = data.updated_at ? `当前文件更新时间：${data.updated_at}` : '当前关键词';
        setStatus(data.backup ? `更新完成，已备份为 ${data.backup}` : '更新完成');
        await loadBackups();
      } catch (error) {
        setStatus(error.message, true);
      } finally {
        uploadBtn.disabled = !fileInput.files[0];
      }
    });

    Promise.all([loadKeywords(), loadBackups()]).catch(error => {
      setStatus(error.message, true);
    });

    // ── 资讯查询 ──
    const searchKeyword = document.getElementById('searchKeyword');
    const searchDate = document.getElementById('searchDate');
    const searchBtn = document.getElementById('searchBtn');
    const resetBtn = document.getElementById('resetBtn');
    const newsStatus = document.getElementById('newsStatus');
    const newsBody = document.getElementById('newsBody');
    const pagination = document.getElementById('pagination');

    let currentPage = 1;
    let currentKeyword = '';
    let currentDate = '';

    // 设置默认日期为今天
    searchDate.value = new Date().toISOString().slice(0, 10);

    function formatDt(isoStr) {
      if (!isoStr) return '-';
      try {
        const d = new Date(isoStr);
        const pad = n => String(n).padStart(2, '0');
        return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
      } catch { return isoStr; }
    }

    async function loadNews(page = 1) {
      newsStatus.textContent = '正在查询...';
      currentPage = page;
      const params = new URLSearchParams();
      if (currentKeyword) params.set('keyword', currentKeyword);
      if (currentDate) params.set('date', currentDate);
      params.set('page', String(page));
      params.set('page_size', '20');

      try {
        const data = await fetchJson('/api/news?' + params.toString());
        if (data.items.length === 0) {
          newsBody.innerHTML = '<tr><td colspan="6" class="no-data">暂无匹配的资讯</td></tr>';
          pagination.innerHTML = '';
        } else {
          newsBody.innerHTML = data.items.map(item => `
            <tr>
              <td><a href="${escapeHtml(item.source_url)}" target="_blank" rel="noopener">${escapeHtml(item.title)}</a></td>
              <td>${escapeHtml(item.source_name)}</td>
              <td>${item.category_l1 ? `<span class="cat-tag">${escapeHtml(item.category_l1)}</span>` : '-'}</td>
              <td>${item.category_l2 ? `<span class="cat-tag">${escapeHtml(item.category_l2)}</span>` : '-'}</td>
              <td>${(item.keywords || []).map(kw => `<span class="kw-tag">${escapeHtml(kw)}</span>`).join('') || '-'}</td>
              <td>${formatDt(item.crawl_time)}</td>
            </tr>
          `).join('');
          renderPagination(data);
        }
        newsStatus.textContent = `共 ${data.total} 条资讯`;
      } catch (error) {
        newsStatus.textContent = error.message;
        newsStatus.classList.add('error');
        newsBody.innerHTML = '<tr><td colspan="6" class="no-data">查询失败</td></tr>';
        pagination.innerHTML = '';
      }
    }

    function renderPagination(data) {
      const total = data.total_pages;
      const page = data.page;
      if (total <= 1) { pagination.innerHTML = ''; return; }

      let html = '';
      html += `<button ${page <= 1 ? 'disabled' : ''} data-page="${page - 1}">上一页</button>`;
      html += `<span class="page-info">第 ${page} / ${total} 页</span>`;
      html += `<button ${page >= total ? 'disabled' : ''} data-page="${page + 1}">下一页</button>`;
      pagination.innerHTML = html;

      pagination.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
          const p = parseInt(btn.dataset.page);
          if (p > 0 && p <= total) loadNews(p);
        });
      });
    }

    searchBtn.addEventListener('click', () => {
      currentKeyword = searchKeyword.value.trim();
      currentDate = searchDate.value;
      loadNews(1);
    });

    resetBtn.addEventListener('click', () => {
      searchKeyword.value = '';
      searchDate.value = new Date().toISOString().slice(0, 10);
      currentKeyword = '';
      currentDate = searchDate.value;
      loadNews(1);
    });

    // 页面首次加载时查询今天的资讯
    loadNews(1);
  </script>
</body>
</html>
